services:
  - type: web
    name: app-coiffure-api
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_COIFFEUSE_NOM
        value: CompteInitial
      - key: APP_COIFFEUSE_EMAIL
        value: admin@example.com
      - key: APP_COIFFEUSE_PASSWORD
        sync: false
      - key: APP_ADMIN_EMAIL
        value: admin@example.com
      - key: SMS_PROVIDER
        value: console
  - type: web
    name: app-coiffure-web
    runtime: docker
    plan: starter
    rootDir: frontend
    dockerfilePath: ./Dockerfile
