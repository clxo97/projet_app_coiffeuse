spring.application.name=app-coiffure-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:salon_coiffure}
spring.datasource.username=${DB_USERNAME:app_coiffure}
spring.datasource.password=${DB_PASSWORD:app_coiffure}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

app.security.jwt.secret=${JWT_SECRET:change-this-secret-key-for-production-change-this-secret-key}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4173,http://127.0.0.1:4200,http://127.0.0.1:4173,http://192.168.137.1:4173,http://192.168.1.245:4173}

app.initial-coiffeuse.nom=${APP_COIFFEUSE_NOM:Coiffeuse}
app.initial-coiffeuse.email=${APP_COIFFEUSE_EMAIL:coiffeuse@salon.local}
app.initial-coiffeuse.password=${APP_COIFFEUSE_PASSWORD:ChangeMe123!}

app.sms.provider=${SMS_PROVIDER:console}
app.sms.scheduler-delay-ms=${SMS_SCHEDULER_DELAY_MS:60000}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from=${TWILIO_FROM:}
